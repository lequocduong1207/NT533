x-kafka-common-environment: &kafka-common-environment
  KAFKA_PROCESS_ROLES: broker,controller

  # KRaft
  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
  CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  # Listeners
  KAFKA_LISTENERS: SASL_SSL://:9094,PLAINTEXT://:9092,CONTROLLER://:9093
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,SASL_SSL:SASL_SSL,PLAINTEXT:PLAINTEXT
  KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

  # SASL
  KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
  KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN

  # ACL
  KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
  KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "true"
  KAFKA_SUPER_USERS: User:admin;User:ANONYMOUS
  KAFKA_EARLY_START_LISTENERS: CONTROLLER

  # TLS
  KAFKA_SSL_KEYSTORE_FILENAME: kafka.keystore.jks
  KAFKA_SSL_KEYSTORE_CREDENTIALS: kafka-keystore.creds
  KAFKA_SSL_KEY_CREDENTIALS: kafka-key.creds
  KAFKA_SSL_CLIENT_AUTH: none

  # Replication
  KAFKA_DEFAULT_REPLICATION_FACTOR: 3
  KAFKA_MIN_INSYNC_REPLICAS: 2
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

  # Retention
  KAFKA_LOG_RETENTION_HOURS: 168
  KAFKA_LOG_RETENTION_BYTES: 5368709120

  # Topic delete
  KAFKA_DELETE_TOPIC_ENABLE: "true"

  # JAAS
  KAFKA_OPTS: -Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf

x-kafka-common-volumes: &kafka-common-volumes
  - kafka_certs_v2:/etc/kafka/secrets:ro
  - ./kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf:ro
  - ./admin.properties:/etc/kafka/admin.properties:ro
  - ./producer.properties:/etc/kafka/producer.properties:ro
  - ./consumer.properties:/etc/kafka/consumer.properties:ro

services:
  kafka-certgen:
    image: eclipse-temurin:17-jdk-jammy
    container_name: kafka-certgen
    entrypoint: ["/bin/bash", "/scripts/generate-certs.sh"]
    volumes:
      - kafka_certs_v2:/certs
      - ./scripts:/scripts:ro

  kafka-1:
    image: apache/kafka:3.9.1
    container_name: kafka-1
    hostname: kafka-1
    ports:
      - "9094:9094"
    depends_on:
      kafka-certgen:
        condition: service_completed_successfully
    environment:
      <<: *kafka-common-environment
      KAFKA_NODE_ID: 1
      KAFKA_ADVERTISED_LISTENERS: SASL_SSL://kafka-1:9094,PLAINTEXT://kafka-1:9092
    volumes: *kafka-common-volumes

  kafka-2:
    image: apache/kafka:3.9.1
    container_name: kafka-2
    hostname: kafka-2
    ports:
      - "9095:9094"
    depends_on:
      kafka-certgen:
        condition: service_completed_successfully
    environment:
      <<: *kafka-common-environment
      KAFKA_NODE_ID: 2
      KAFKA_ADVERTISED_LISTENERS: SASL_SSL://kafka-2:9094,PLAINTEXT://kafka-2:9092
    volumes: *kafka-common-volumes

  kafka-3:
    image: apache/kafka:3.9.1
    container_name: kafka-3
    hostname: kafka-3
    ports:
      - "9096:9094"
    depends_on:
      kafka-certgen:
        condition: service_completed_successfully
    environment:
      <<: *kafka-common-environment
      KAFKA_NODE_ID: 3
      KAFKA_ADVERTISED_LISTENERS: SASL_SSL://kafka-3:9094,PLAINTEXT://kafka-3:9092
    volumes: *kafka-common-volumes

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      kafka-certgen:
        condition: service_completed_successfully
      kafka-1:
        condition: service_started
      kafka-2:
        condition: service_started
      kafka-3:
        condition: service_started
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9094,kafka-2:9094,kafka-3:9094

      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SASL_SSL
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: PLAIN
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.truststore.jks
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: changeit
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_TYPE: JKS

      KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: >
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="admin"
        password="12345";
    volumes:
      - kafka_certs_v2:/etc/kafka/secrets:ro

volumes:
  kafka_certs_v2:
  kafka1_data_v2:
  kafka2_data_v2:
  kafka3_data_v2: